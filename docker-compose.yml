version: '3.9'

services:
  # PostgreSQL database for storing agent data, tasks, and results
  postgres:
    image: postgres:16-alpine
    container_name: pentagi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pentagi}
      POSTGRES_USER: ${POSTGRES_USER:-pentagi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pentagi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pentagi} -d ${POSTGRES_DB:-pentagi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and pub/sub messaging between agents
  redis:
    image: redis:7-alpine
    container_name: pentagi-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-pentagi}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-pentagi}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Main Pentagi backend API server
  backend:
    build:
      context: .
      dockerfile: pkg/Dockerfile
      target: production
    container_name: pentagi-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-pentagi}:${POSTGRES_PASSWORD:-pentagi}@postgres:5432/${POSTGRES_DB:-pentagi}?sslmode=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD:-pentagi}@redis:6379/0
      - SERVER_HOST=${SERVER_HOST:-0.0.0.0}
      - SERVER_PORT=${SERVER_PORT:-8080}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./pkg:/app/pkg:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Frontend web interface
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: production
    container_name: pentagi-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
      - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: pentagi-network
